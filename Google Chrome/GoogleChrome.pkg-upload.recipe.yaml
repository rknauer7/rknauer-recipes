Description: Links directly to the core community Google Chrome package track to inherit signature checks and upload straight to Jamf Pro.
Identifier: com.github.rknauer.GoogleChrome.pkg-upload
Input:
  CATEGORY: Apps
MinimumVersion: '2.0.0'
ParentRecipe: com.github.autopkg.download.googlechrome
Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_name: '%NAME%-%version%.pkg'
