Description: Links to homebysix's DbVisualizer track to cleanly extract versions and push compiled installer packages to Jamf.
Identifier: com.github.rknauer.DbVisualizer.pkg-upload
Input:
  CATEGORY: Apps
MinimumVersion: '2.0.0'
ParentRecipe: com.facebook.autopkg.download.dbvisualizer
Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_name: '%NAME%-%version%.pkg'
