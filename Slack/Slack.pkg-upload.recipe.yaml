Description: Utilizes community core download patterns to upload the latest versioned Slack package to Jamf Pro.
Identifier: com.github.rknauer.Slack.pkg-upload
Input:
  CATEGORY: Apps
MinimumVersion: '2.0.0'
ParentRecipe: com.github.rtrouton.download.SlackUniversal
Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_name: '%NAME%-%version%.pkg'
